<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telco Customer Churn Prediction</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-light);
            margin-top: 10px;
            font-size: 1.1rem;
        }

        form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        input, select {
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .submit-btn {
            grid-column: 1 / -1;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
        }

        .result-container {
            grid-column: 1 / -1;
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .result-success {
            background: #dcfce7;
            border: 1px solid #86efac;
            color: #166534;
        }

        .result-danger {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading spinner */
        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Müşteri Kayıp Tahmini (Churn)</h1>
            <p>Müşteri verilerini girerek ayrılma ihtimalini yapay zeka ile tahmin edin.</p>
        </div>

        <form id="predictForm">
            <!-- Temel Bilgiler -->
            <div class="form-group">
                <label>Cinsiyet (gender)</label>
                <select name="gender" required>
                    <option value="Male">Erkek (Male)</option>
                    <option value="Female">Kadın (Female)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Yaşlı Vatandaş (SeniorCitizen)</label>
                <select name="SeniorCitizen" required>
                    <option value="0">Hayır (0)</option>
                    <option value="1">Evet (1)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Partner (Partner)</label>
                <select name="Partner" required>
                    <option value="Yes">Evet (Yes)</option>
                    <option value="No">Hayır (No)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Bakmakla Yükümlü (Dependents)</label>
                <select name="Dependents" required>
                    <option value="No">Hayır (No)</option>
                    <option value="Yes">Evet (Yes)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Abonelik Süresi (tenure - ay)</label>
                <input type="number" name="tenure" min="0" value="12" required>
            </div>

            <!-- Servisler -->
            <div class="form-group">
                <label>Telefon Servisi (PhoneService)</label>
                <select name="PhoneService" required>
                    <option value="Yes">Evet</option>
                    <option value="No">Hayır</option>
                </select>
            </div>
            <div class="form-group">
                <label>Çoklu Hat (MultipleLines)</label>
                <select name="MultipleLines" required>
                    <option value="No">Hayır</option>
                    <option value="Yes">Evet</option>
                    <option value="No phone service">Telefon Servisi Yok</option>
                </select>
            </div>
            <div class="form-group">
                <label>İnternet Servisi (InternetService)</label>
                <select name="InternetService" required>
                    <option value="Fiber optic">Fiber Optik</option>
                    <option value="DSL">DSL</option>
                    <option value="No">Yok</option>
                </select>
            </div>
            <div class="form-group">
                <label>Online Güvenlik (OnlineSecurity)</label>
                <select name="OnlineSecurity" required>
                    <option value="No">Hayır</option>
                    <option value="Yes">Evet</option>
                    <option value="No internet service">İnternet Servisi Yok</option>
                </select>
            </div>
            <div class="form-group">
                <label>Online Yedekleme (OnlineBackup)</label>
                <select name="OnlineBackup" required>
                    <option value="No">Hayır</option>
                    <option value="Yes">Evet</option>
                    <option value="No internet service">İnternet Servisi Yok</option>
                </select>
            </div>
            <div class="form-group">
                <label>Cihaz Koruması (DeviceProtection)</label>
                <select name="DeviceProtection" required>
                    <option value="No">Hayır</option>
                    <option value="Yes">Evet</option>
                    <option value="No internet service">İnternet Servisi Yok</option>
                </select>
            </div>
            <div class="form-group">
                <label>Teknik Destek (TechSupport)</label>
                <select name="TechSupport" required>
                    <option value="No">Hayır</option>
                    <option value="Yes">Evet</option>
                    <option value="No internet service">İnternet Servisi Yok</option>
                </select>
            </div>
            <div class="form-group">
                <label>TV Yayını (StreamingTV)</label>
                <select name="StreamingTV" required>
                    <option value="No">Hayır</option>
                    <option value="Yes">Evet</option>
                    <option value="No internet service">İnternet Servisi Yok</option>
                </select>
            </div>
            <div class="form-group">
                <label>Film Yayını (StreamingMovies)</label>
                <select name="StreamingMovies" required>
                    <option value="No">Hayır</option>
                    <option value="Yes">Evet</option>
                    <option value="No internet service">İnternet Servisi Yok</option>
                </select>
            </div>

            <!-- Fatura ve Sözleşme -->
            <div class="form-group">
                <label>Sözleşme (Contract)</label>
                <select name="Contract" required>
                    <option value="Month-to-month">Aydan Aya</option>
                    <option value="One year">1 Yıllık</option>
                    <option value="Two year">2 Yıllık</option>
                </select>
            </div>
            <div class="form-group">
                <label>Kağıtsız Fatura (PaperlessBilling)</label>
                <select name="PaperlessBilling" required>
                    <option value="Yes">Evet</option>
                    <option value="No">Hayır</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ödeme Yöntemi (PaymentMethod)</label>
                <select name="PaymentMethod" required>
                    <option value="Electronic check">Elektronik Çek</option>
                    <option value="Mailed check">Postalı Çek</option>
                    <option value="Bank transfer (automatic)">Banka Transferi (Otomatik)</option>
                    <option value="Credit card (automatic)">Kredi Kartı (Otomatik)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Aylık Ücret (MonthlyCharges)</label>
                <input type="number" step="0.01" name="MonthlyCharges" value="70.0" required>
            </div>
            <div class="form-group">
                <label>Toplam Ücret (TotalCharges)</label>
                <input type="number" step="0.01" name="TotalCharges" value="840.0" required>
            </div>

            <button type="submit" class="submit-btn">Tahmin Et (Predict)</button>
        </form>

        <div class="loader" id="loader"></div>
        <div id="result" class="result-container"></div>
    </div>

    <script>
        document.getElementById('predictForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // Veri tiplerini dönüştür (JSON için gerekli)
            data.SeniorCitizen = parseInt(data.SeniorCitizen);
            data.tenure = parseInt(data.tenure);
            data.MonthlyCharges = parseFloat(data.MonthlyCharges);
            data.TotalCharges = parseFloat(data.TotalCharges);

            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');
            
            loader.style.display = 'block';
            resultDiv.style.display = 'none';
            resultDiv.className = 'result-container';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                loader.style.display = 'none';
                resultDiv.style.display = 'block';

                if (response.ok) {
                    const isChurn = result.churn_prediction === 'Yes';
                    const prob = (result.churn_probability * 100).toFixed(2);
                    
                    if (isChurn) {
                        resultDiv.classList.add('result-danger');
                        resultDiv.innerHTML = `<h3>⚠️ Riskli Müşteri!</h3>
                                               <p>Müşterinin servisi <strong>bırakma</strong> ihtimali: <strong>%${prob}</strong></p>`;
                    } else {
                        resultDiv.classList.add('result-success');
                        resultDiv.innerHTML = `<h3>✅ Güvenli Müşteri</h3>
                                               <p>Müşterinin serviste <strong>kalma</strong> ihtimali yüksek. Bırakma riski: <strong>%${prob}</strong></p>`;
                    }
                } else {
                    resultDiv.classList.add('result-danger');
                    resultDiv.innerHTML = `<p>Hata: ${result.detail || 'Bilinmeyen bir hata oluştu.'}</p>`;
                }
            } catch (error) {
                loader.style.display = 'none';
                resultDiv.style.display = 'block';
                resultDiv.classList.add('result-danger');
                resultDiv.innerHTML = `<p>Sunucuya bağlanılamadı. Lütfen API'nin çalıştığından emin olun.</p>`;
            }
        });
    </script>
</body>
</html>
